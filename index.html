<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuditFlow — Paid Ads Intelligence</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0D0D; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    input::placeholder { color: #444; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0D0D0D; }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    const ACCENT = "#FF4D00";
    const DARK = "#0D0D0D";
    const SURFACE = "#161616";
    const CARD = "#1E1E1E";
    const BORDER = "#2A2A2A";
    const MUTED = "#888";

    const SECTION_ICONS = {
      "Executive Summary": "◈", "Campaign Performance": "◉",
      "Audience & Targeting": "◎", "Creative Analysis": "◑",
      "Budget & Bidding": "◐", "Landing Page Review": "◍",
      "Quick Wins": "◆", "Strategic Recommendations": "◇",
    };

    const SCORE_COLORS = { high: "#22c55e", medium: "#f59e0b", low: "#ef4444" };

    const MATCH_COLORS = {
      broad:  { bg: "#3b82f620", border: "#3b82f644", text: "#60a5fa", label: "Broad"  },
      phrase: { bg: "#a855f720", border: "#a855f744", text: "#c084fc", label: "Phrase" },
      exact:  { bg: "#22c55e20", border: "#22c55e44", text: "#4ade80", label: "Exact"  },
    };

    async function callClaude(body) {
      const res = await fetch("/api/anthropic", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ...body, model: "claude-sonnet-4-20250514", max_tokens: 4000 }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${res.status}`);
      }
      return res.json();
    }

    function csvSample(text, maxRows = 40) {
      return text.split("\n").slice(0, maxRows).join("\n");
    }

    async function readFileText(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.onerror = () => rej(new Error("Read failed"));
        r.readAsText(file);
      });
    }

    function parseReport(raw) {
      const sections = [];
      let current = null;
      for (const line of raw.split("\n")) {
        const heading = line.match(/^#{1,2}\s+(.+)/);
        if (heading) {
          if (current) sections.push(current);
          const title = heading[1].replace(/\s*\[score:\s*\d+\]/i, "").trim();
          const scoreMatch = heading[1].match(/\[score:\s*(\d+)\]/i);
          current = { title, content: "", score: scoreMatch ? parseInt(scoreMatch[1]) : null };
        } else if (current) {
          current.content += (current.content ? "\n" : "") + line;
        }
      }
      if (current) sections.push(current);
      return sections.map((s) => ({ ...s, content: s.content.trim() })).filter((s) => s.content);
    }

    function ScoreBadge({ score }) {
      const level = score >= 70 ? "high" : score >= 40 ? "medium" : "low";
      const label = score >= 70 ? "Good" : score >= 40 ? "Fair" : "Poor";
      return (
        <span style={{ background: SCORE_COLORS[level] + "22", color: SCORE_COLORS[level], border: `1px solid ${SCORE_COLORS[level]}44`, borderRadius: 6, padding: "2px 10px", fontSize: 13, fontWeight: 700, letterSpacing: 0.5 }}>
          {score}/100 · {label}
        </span>
      );
    }

    function MultiUploadZone({ files, onFile, onRemove, maxFiles }) {
      const [drag, setDrag] = useState(false);
      const input = useRef();
      const atLimit = files.length >= maxFiles;
      const FILE_ICONS = ["📊", "🎨", "📋", "📈", "📂"];
      const handleDrop = (e) => {
        e.preventDefault(); setDrag(false);
        Array.from(e.dataTransfer.files).slice(0, maxFiles - files.length).forEach(onFile);
      };
      const handleChange = (e) => {
        Array.from(e.target.files).slice(0, maxFiles - files.length).forEach(onFile);
        e.target.value = "";
      };
      return (
        <div>
          <div onClick={() => !atLimit && input.current.click()}
            onDragOver={(e) => { e.preventDefault(); if (!atLimit) setDrag(true); }}
            onDragLeave={() => setDrag(false)} onDrop={handleDrop}
            style={{ border: `2px dashed ${drag ? ACCENT : atLimit ? "#22c55e55" : BORDER}`, borderRadius: 12, padding: "20px 24px", cursor: atLimit ? "default" : "pointer", background: drag ? ACCENT + "0A" : atLimit ? "#22c55e06" : SURFACE, transition: "all 0.2s", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6, minHeight: 90 }}>
            <input ref={input} type="file" multiple accept=".csv,.xlsx,.xls,.txt" style={{ display: "none" }} onChange={handleChange} />
            <div style={{ fontSize: 24 }}>{atLimit ? "✓" : "📁"}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: atLimit ? "#22c55e" : "#ccc" }}>
              {atLimit ? `${maxFiles}/${maxFiles} files uploaded` : files.length > 0 ? `${files.length}/${maxFiles} files — click or drop to add more` : "Click or drag & drop your export files"}
            </div>
            <div style={{ fontSize: 11, color: MUTED }}>{atLimit ? "Remove a file to add a different one" : "CSV, Excel (.xlsx), or .txt · up to 5 files"}</div>
          </div>
          {files.length > 0 && (
            <div style={{ marginTop: 10, display: "flex", flexDirection: "column", gap: 6 }}>
              {files.map((f, i) => (
                <div key={f.name} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "8px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                    <span style={{ fontSize: 16 }}>{FILE_ICONS[i % FILE_ICONS.length]}</span>
                    <div style={{ minWidth: 0 }}>
                      <div style={{ fontSize: 13, color: "#ddd", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 340 }}>{f.name}</div>
                      <div style={{ fontSize: 11, color: MUTED }}>{(f.size / 1024).toFixed(1)} KB</div>
                    </div>
                  </div>
                  <button onClick={() => onRemove(f.name)}
                    onMouseEnter={(e) => { e.target.style.borderColor = "#ef4444"; e.target.style.color = "#ef4444"; }}
                    onMouseLeave={(e) => { e.target.style.borderColor = BORDER; e.target.style.color = MUTED; }}
                    style={{ background: "transparent", border: `1px solid ${BORDER}`, color: MUTED, borderRadius: 6, width: 26, height: 26, cursor: "pointer", fontSize: 14, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function EditableSection({ section, onUpdate }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState(section.content);
      const save = () => { onUpdate({ ...section, content: draft }); setEditing(false); };
      const cancel = () => { setDraft(section.content); setEditing(false); };
      return (
        <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, marginBottom: 16, overflow: "hidden" }}>
          <div style={{ padding: "14px 20px", borderBottom: `1px solid ${BORDER}`, display: "flex", alignItems: "center", justifyContent: "space-between", background: "#1A1A1A" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ color: ACCENT, fontSize: 18 }}>{SECTION_ICONS[section.title] || "◈"}</span>
              <span style={{ fontWeight: 700, color: "#fff", fontFamily: "'DM Serif Display', serif", fontSize: 16 }}>{section.title}</span>
              {section.score != null && <ScoreBadge score={section.score} />}
            </div>
            <button onClick={() => setEditing(!editing)} style={{ background: editing ? ACCENT + "22" : "transparent", border: `1px solid ${editing ? ACCENT : BORDER}`, color: editing ? ACCENT : MUTED, borderRadius: 8, padding: "4px 14px", cursor: "pointer", fontSize: 12, fontWeight: 600, transition: "all 0.2s" }}>
              {editing ? "Cancel" : "✎ Edit"}
            </button>
          </div>
          <div style={{ padding: "16px 20px" }}>
            {editing ? (
              <>
                <textarea value={draft} onChange={(e) => setDraft(e.target.value)}
                  style={{ width: "100%", minHeight: 180, background: "#111", border: `1px solid ${ACCENT}55`, borderRadius: 8, color: "#eee", padding: 14, fontSize: 14, lineHeight: 1.7, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
                <div style={{ display: "flex", gap: 8, marginTop: 10, justifyContent: "flex-end" }}>
                  <button onClick={cancel} style={{ background: "transparent", border: `1px solid ${BORDER}`, color: MUTED, borderRadius: 8, padding: "6px 18px", cursor: "pointer", fontSize: 13 }}>Discard</button>
                  <button onClick={save} style={{ background: ACCENT, border: "none", color: "#fff", borderRadius: 8, padding: "6px 18px", cursor: "pointer", fontSize: 13, fontWeight: 700 }}>Save Changes</button>
                </div>
              </>
            ) : (
              <div style={{ color: "#ccc", fontSize: 14, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{section.content}</div>
            )}
          </div>
        </div>
      );
    }

    function KeywordPill({ kw, matchType }) {
      const c = MATCH_COLORS[matchType];
      const display = matchType === "phrase" ? `"${kw.keyword}"` : matchType === "exact" ? `[${kw.keyword}]` : kw.keyword;
      return (
        <div style={{ background: c.bg, border: `1px solid ${c.border}`, borderRadius: 8, padding: "8px 12px", marginBottom: 8 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <span style={{ background: c.bg, color: c.text, border: `1px solid ${c.border}`, borderRadius: 4, padding: "1px 7px", fontSize: 10, fontWeight: 700, letterSpacing: 0.5, textTransform: "uppercase", flexShrink: 0 }}>{c.label}</span>
            <span style={{ color: "#e2e8f0", fontWeight: 600, fontSize: 13, fontFamily: "monospace" }}>{display}</span>
          </div>
          {kw.rationale && <div style={{ color: MUTED, fontSize: 12 }}>{kw.rationale}</div>}
        </div>
      );
    }

    function CopyCard({ text, meta, limit }) {
      const [copied, setCopied] = useState(false);
      const copy = () => { navigator.clipboard.writeText(text).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); }); };
      const over = text.length > limit;
      return (
        <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, padding: "10px 14px", display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 8 }}>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ color: "#fff", fontSize: 14, fontWeight: 600, lineHeight: 1.5 }}>{text}</div>
            <div style={{ fontSize: 11, color: over ? "#ef4444" : MUTED, marginTop: 3 }}>{text.length}/{limit} chars {over ? "⚠ over limit" : ""} {meta ? `· ${meta}` : ""}</div>
          </div>
          <button onClick={copy} style={{ background: "transparent", border: `1px solid ${BORDER}`, color: copied ? "#22c55e" : MUTED, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 11, flexShrink: 0, transition: "all 0.15s" }}>{copied ? "✓" : "Copy"}</button>
        </div>
      );
    }

    function KeywordStrategyTab({ strategy }) {
      const [openGroup, setOpenGroup] = useState(0);
      if (!strategy) return (
        <div style={{ textAlign: "center", padding: "60px 20px", color: MUTED }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>🔑</div>
          <div style={{ fontSize: 16 }}>Keyword strategy not available</div>
        </div>
      );
      const { adGroups = [], negativeKeywords = [], summary = "" } = strategy;
      return (
        <div>
          {summary && (
            <div style={{ background: "#3b82f612", border: "1px solid #3b82f630", borderRadius: 12, padding: "16px 20px", marginBottom: 24, color: "#93c5fd", fontSize: 14, lineHeight: 1.7 }}>
              <span style={{ fontWeight: 700, color: "#60a5fa" }}>Strategy Overview · </span>{summary}
            </div>
          )}
          <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            {adGroups.map((g, i) => (
              <button key={i} onClick={() => setOpenGroup(i)} style={{ padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s", background: openGroup === i ? "#3b82f6" : "transparent", border: `1px solid ${openGroup === i ? "#3b82f6" : BORDER}`, color: openGroup === i ? "#fff" : MUTED }}>{g.name}</button>
            ))}
          </div>
          {adGroups[openGroup] && (() => {
            const g = adGroups[openGroup];
            return (
              <div>
                {g.theme && <div style={{ color: MUTED, fontSize: 13, marginBottom: 20, fontStyle: "italic" }}>Theme: {g.theme}</div>}
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
                  <div>
                    <div style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, fontWeight: 700 }}>Keywords</div>
                    {(g.broad || []).map((k, i) => <KeywordPill key={`b${i}`} kw={k} matchType="broad" />)}
                    {(g.phrase || []).map((k, i) => <KeywordPill key={`p${i}`} kw={k} matchType="phrase" />)}
                    {(g.exact || []).map((k, i) => <KeywordPill key={`e${i}`} kw={k} matchType="exact" />)}
                    {(g.negatives || []).length > 0 && (
                      <div style={{ marginTop: 12 }}>
                        <div style={{ fontSize: 11, color: "#ef4444", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8, fontWeight: 700 }}>Negatives</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                          {g.negatives.map((n, i) => <span key={i} style={{ background: "#ef444412", border: "1px solid #ef444430", color: "#f87171", borderRadius: 6, padding: "3px 10px", fontSize: 12 }}>−{n}</span>)}
                        </div>
                      </div>
                    )}
                  </div>
                  <div>
                    <div style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, fontWeight: 700 }}>Ad Copy</div>
                    <div style={{ fontSize: 11, color: "#60a5fa", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Headlines</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
                      {(g.headlines || []).map((h, i) => <CopyCard key={i} text={h.text} meta={h.type} limit={30} />)}
                    </div>
                    <div style={{ fontSize: 11, color: "#a855f7", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Descriptions</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {(g.descriptions || []).map((d, i) => <CopyCard key={i} text={d.text} meta={d.focus} limit={90} />)}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
          {negativeKeywords.length > 0 && (
            <div style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 12, padding: 20, marginTop: 8 }}>
              <div style={{ fontSize: 12, color: "#ef4444", textTransform: "uppercase", letterSpacing: 1, marginBottom: 12, fontWeight: 700 }}>Campaign-Level Negative Keywords</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {negativeKeywords.map((n, i) => <span key={i} style={{ background: "#ef444412", border: "1px solid #ef444430", color: "#f87171", borderRadius: 6, padding: "4px 12px", fontSize: 12 }}>−{n}</span>)}
              </div>
            </div>
          )}
        </div>
      );
    }

    function AdsAuditor() {
      const [websiteUrl, setWebsiteUrl]           = useState("");
      const [mediaFiles, setMediaFiles]           = useState([]);
      const [platform, setPlatform]               = useState("Google Ads");
      const [goals, setGoals]                     = useState("");
      const [loading, setLoading]                 = useState(false);
      const [progress, setProgress]               = useState("");
      const [report, setReport]                   = useState(null);
      const [sections, setSections]               = useState([]);
      const [keywordStrategy, setKeywordStrategy] = useState(null);
      const [activeTab, setActiveTab]             = useState("audit");
      const [error, setError]                     = useState("");
      const [exporting, setExporting]             = useState(false);

      const handleFile = useCallback((f) => {
        setMediaFiles((prev) => {
          if (prev.length >= 5 || prev.find((p) => p.name === f.name)) return prev;
          return [...prev, f];
        });
      }, []);

      const removeFile = (name) => setMediaFiles((prev) => prev.filter((f) => f.name !== name));

      const runAudit = async () => {
        if (!websiteUrl && mediaFiles.length === 0) {
          setError("Please provide at least a website URL or upload a media export file.");
          return;
        }
        setError(""); setLoading(true); setReport(null); setKeywordStrategy(null); setActiveTab("audit");
        try {
          setProgress("Reading uploaded files…");
          const fileContents = [];
          for (const f of mediaFiles) {
            try { const text = await readFileText(f); fileContents.push(`\n=== FILE: ${f.name} ===\n${csvSample(text)}\n`); }
            catch { fileContents.push(`\n=== FILE: ${f.name} (unreadable) ===\n`); }
          }

          setProgress("Analyzing your ads data…");
          const auditData = await callClaude({
            system: `You are a world-class paid media auditor and strategist. Analyze advertising data and produce a comprehensive, actionable audit report.

Format your response with these EXACT section headings (use ## for headings):
## Executive Summary [score: X]
## Campaign Performance [score: X]
## Audience & Targeting [score: X]
## Creative Analysis [score: X]
## Budget & Bidding [score: X]
## Landing Page Review [score: X]
## Quick Wins
## Strategic Recommendations

Score X is out of 100. Be specific, data-driven, and actionable. Write in clear professional prose.`,
            messages: [{ role: "user", content: `Audit this paid advertising setup:\nPlatform: ${platform}\nWebsite URL: ${websiteUrl || "(not provided)"}\nBusiness Goals: ${goals || "(not specified)"}\n${fileContents.length > 0 ? `\nExport Data:\n${fileContents.join("\n")}` : "\nNo export files — audit based on URL and provide best-practice guidance."}` }],
          });

          const rawReport = auditData.content.map((b) => b.text || "").join("");
          setProgress("Parsing report…");
          const parsed = parseReport(rawReport);
          setSections(parsed);
          setReport(rawReport);

          setProgress("Building keyword strategy…");
          const kwData = await callClaude({
            system: `You are a Google Ads keyword strategy expert. Respond ONLY with valid JSON — no markdown, no backticks, no explanation.

Return this exact structure:
{
  "adGroups": [{ "name": "...", "theme": "...", "broad": [{"keyword":"...","rationale":"..."}], "phrase": [{"keyword":"...","rationale":"..."}], "exact": [{"keyword":"...","rationale":"..."}], "negatives": ["..."], "headlines": [{"text":"...","type":"primary"}], "descriptions": [{"text":"...","focus":"..."}] }],
  "negativeKeywords": ["..."],
  "summary": "..."
}
Generate 3-4 ad groups. Headlines STRICT max 30 chars. Descriptions STRICT max 90 chars.`,
            messages: [{ role: "user", content: `Google Ads keyword strategy for:\nPlatform: ${platform}\nWebsite: ${websiteUrl || "(not provided)"}\nGoals: ${goals || "(not specified)"}\n${fileContents.length > 0 ? `Context:\n${fileContents.slice(0, 2).join("\n")}` : ""}` }],
          });

          const kwRaw = kwData.content.map((b) => b.text || "").join("").trim().replace(/^```json\s*/i, "").replace(/```\s*$/i, "").trim();
          try { setKeywordStrategy(JSON.parse(kwRaw)); } catch { }
          setProgress("");
        } catch (e) {
          setError("Audit failed: " + e.message);
        } finally {
          setLoading(false);
        }
      };

      const updateSection = (idx, updated) => setSections((prev) => prev.map((s, i) => i === idx ? updated : s));

      const exportReport = () => {
        setExporting(true);
        try {
          const date = new Date().toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" });
          const kwHtml = keywordStrategy ? `<h1 style="margin-top:48px">Keyword Strategy</h1>${keywordStrategy.summary ? `<p style="color:#555;font-style:italic">${keywordStrategy.summary}</p>` : ""}${(keywordStrategy.adGroups || []).map((g) => `<h2>${g.name}</h2>${g.theme ? `<p><em>${g.theme}</em></p>` : ""}<h3 style="color:#3b82f6">Broad Match</h3>${(g.broad || []).map((k) => `<p><code>${k.keyword}</code>${k.rationale ? ` — ${k.rationale}` : ""}</p>`).join("")}<h3 style="color:#a855f7">Phrase Match</h3>${(g.phrase || []).map((k) => `<p><code>"${k.keyword}"</code>${k.rationale ? ` — ${k.rationale}` : ""}</p>`).join("")}<h3 style="color:#22c55e">Exact Match</h3>${(g.exact || []).map((k) => `<p><code>[${k.keyword}]</code>${k.rationale ? ` — ${k.rationale}` : ""}</p>`).join("")}${g.negatives?.length ? `<h3 style="color:#ef4444">Negatives</h3><p>${g.negatives.map((n) => `<code>−${n}</code>`).join(" ")}</p>` : ""}<h3>Headlines</h3>${(g.headlines || []).map((h) => `<p>✦ ${h.text} <small>(${h.text.length}/30)</small></p>`).join("")}<h3>Descriptions</h3>${(g.descriptions || []).map((d) => `<p>${d.text} <small>(${d.text.length}/90)</small></p>`).join("")}`).join("<hr>")}${keywordStrategy.negativeKeywords?.length ? `<h2>Campaign Negatives</h2><p>${keywordStrategy.negativeKeywords.map((n) => `<code>−${n}</code>`).join(" ")}</p>` : ""}` : "";
          const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AuditFlow Report</title><style>body{font-family:Arial,sans-serif;max-width:860px;margin:40px auto;color:#222;line-height:1.7}h1{color:#FF4D00;border-bottom:3px solid #FF4D00;padding-bottom:12px}h2{color:#1a1a1a;margin-top:32px;border-left:4px solid #FF4D00;padding-left:12px}h3{color:#333;margin-top:20px}.meta{color:#666;font-size:14px;margin-bottom:32px}.score{background:#f5f5f5;border-radius:6px;padding:2px 10px;font-size:13px;font-weight:bold;display:inline-block;margin-left:10px}.section{background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;padding:20px;margin-bottom:20px}code{background:#f0f0f0;padding:2px 6px;border-radius:4px;font-size:13px}hr{border:none;border-top:1px solid #e5e5e5;margin:32px 0}p{margin:8px 0}</style></head><body><h1>Paid Ads Audit Report</h1><div class="meta"><strong>Platform:</strong> ${platform} &nbsp;|&nbsp; <strong>Website:</strong> ${websiteUrl || "N/A"} &nbsp;|&nbsp; <strong>Date:</strong> ${date}</div>${sections.map((s) => `<div class="section"><h2>${s.title}${s.score != null ? `<span class="score">${s.score}/100</span>` : ""}</h2>${s.content.split("\n").map((l) => l.trim() ? `<p>${l}</p>` : "").join("")}</div>`).join("")}${kwHtml}</body></html>`;
          const blob = new Blob([html], { type: "text/html" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = `auditflow-report-${Date.now()}.html`;
          a.click(); URL.revokeObjectURL(url);
        } catch (e) { alert("Export failed: " + e.message); }
        finally { setExporting(false); }
      };

      const overallScore = sections.length > 0
        ? Math.round(sections.filter((s) => s.score != null).reduce((a, s) => a + s.score, 0) / Math.max(1, sections.filter((s) => s.score != null).length))
        : null;

      return (
        <div style={{ minHeight: "100vh", background: DARK, color: "#eee", fontFamily: "'DM Sans','Helvetica Neue',sans-serif", padding: "0 0 60px" }}>
          {/* Header */}
          <div style={{ borderBottom: `1px solid ${BORDER}`, padding: "20px 40px", display: "flex", alignItems: "center", justifyContent: "space-between", background: SURFACE }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ width: 36, height: 36, background: ACCENT, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 900, color: "#fff" }}>⚡</div>
              <div>
                <div style={{ fontFamily: "'DM Serif Display',Georgia,serif", fontSize: 20, fontWeight: 700, letterSpacing: -0.5 }}>AuditFlow</div>
                <div style={{ fontSize: 11, color: MUTED, letterSpacing: 1, textTransform: "uppercase" }}>Paid Ads Intelligence · Oswald Marketing</div>
              </div>
            </div>
            {report && (
              <button onClick={exportReport} disabled={exporting} style={{ background: "transparent", border: `1px solid ${ACCENT}`, color: ACCENT, borderRadius: 8, padding: "8px 20px", cursor: "pointer", fontSize: 13, fontWeight: 600, opacity: exporting ? 0.6 : 1 }}>
                {exporting ? "Exporting…" : "↓ Export Report"}
              </button>
            )}
          </div>

          <div style={{ maxWidth: 900, margin: "0 auto", padding: "40px 24px 0" }}>
            {!report && (
              <div style={{ animation: "fadeIn 0.4s ease" }}>
                <div style={{ marginBottom: 32 }}>
                  <h1 style={{ fontFamily: "'DM Serif Display',Georgia,serif", fontSize: 36, fontWeight: 400, letterSpacing: -1, color: "#fff", margin: "0 0 8px" }}>
                    Audit your paid ads.<br /><span style={{ color: ACCENT }}>In seconds.</span>
                  </h1>
                  <p style={{ color: MUTED, fontSize: 15, margin: 0 }}>Upload your media exports, enter your site — get a full AI-powered recommendation report.</p>
                </div>

                <div style={{ background: SURFACE, border: `1px solid ${BORDER}`, borderRadius: 16, padding: 28, marginBottom: 20 }}>
                  <div style={{ marginBottom: 20 }}>
                    <label style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Ad Platform</label>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {["Google Ads", "Meta Ads", "LinkedIn Ads", "TikTok Ads", "YouTube Ads", "OTT Ads", "Display Ads", "Other"].map((p) => (
                        <button key={p} onClick={() => setPlatform(p)} style={{ padding: "7px 16px", borderRadius: 8, fontSize: 13, fontWeight: 600, cursor: "pointer", transition: "all 0.15s", background: platform === p ? ACCENT : "transparent", border: `1px solid ${platform === p ? ACCENT : BORDER}`, color: platform === p ? "#fff" : MUTED }}>{p}</button>
                      ))}
                    </div>
                  </div>

                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 }}>
                    <div>
                      <label style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Website URL</label>
                      <input value={websiteUrl} onChange={(e) => setWebsiteUrl(e.target.value)} placeholder="https://yoursite.com"
                        style={{ width: "100%", background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, color: "#eee", padding: "10px 14px", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Campaign Goals</label>
                      <input value={goals} onChange={(e) => setGoals(e.target.value)} placeholder="e.g. Drive signups, lower CPA below $50"
                        style={{ width: "100%", background: CARD, border: `1px solid ${BORDER}`, borderRadius: 8, color: "#eee", padding: "10px 14px", fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
                    </div>
                  </div>

                  <div>
                    <label style={{ fontSize: 12, color: MUTED, textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 10 }}>
                      Media Exports <span style={{ color: BORDER }}>— up to 5 CSV, Excel, or text exports</span>
                    </label>
                    <MultiUploadZone files={mediaFiles} onFile={handleFile} onRemove={removeFile} maxFiles={5} />
                  </div>
                </div>

                {error && <div style={{ background: "#ef444420", border: "1px solid #ef444440", borderRadius: 8, padding: "10px 16px", marginBottom: 16, color: "#ef4444", fontSize: 14 }}>{error}</div>}

                <button onClick={runAudit} disabled={loading} style={{ width: "100%", background: loading ? "#333" : ACCENT, border: "none", color: "#fff", borderRadius: 10, padding: "16px 0", fontSize: 16, fontWeight: 700, cursor: loading ? "not-allowed" : "pointer", letterSpacing: 0.3, transition: "all 0.2s" }}>
                  {loading ? (
                    <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
                      <span style={{ animation: "spin 1s linear infinite", display: "inline-block" }}>◌</span>
                      {progress || "Analyzing…"}
                    </span>
                  ) : "⚡ Run Audit"}
                </button>
              </div>
            )}

            {report && sections.length > 0 && (
              <div style={{ animation: "fadeIn 0.5s ease" }}>
                <div style={{ background: `linear-gradient(135deg,${ACCENT}18,transparent)`, border: `1px solid ${ACCENT}33`, borderRadius: 14, padding: 24, marginBottom: 24, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>
                  <div>
                    <div style={{ fontSize: 11, color: ACCENT, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 700, marginBottom: 4 }}>Audit Complete</div>
                    <h2 style={{ fontFamily: "'DM Serif Display',Georgia,serif", fontSize: 26, margin: 0, color: "#fff", fontWeight: 400 }}>{platform} Recommendation Report</h2>
                    {websiteUrl && <div style={{ color: MUTED, fontSize: 13, marginTop: 4 }}>{websiteUrl}</div>}
                  </div>
                  {overallScore != null && (
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 11, color: MUTED, textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>Overall Score</div>
                      <div style={{ fontSize: 42, fontWeight: 900, lineHeight: 1, color: overallScore >= 70 ? "#22c55e" : overallScore >= 40 ? "#f59e0b" : "#ef4444" }}>{overallScore}</div>
                      <div style={{ fontSize: 12, color: MUTED }}>out of 100</div>
                    </div>
                  )}
                </div>

                <div style={{ display: "flex", gap: 4, marginBottom: 24, borderBottom: `1px solid ${BORDER}` }}>
                  {[{ id: "audit", label: "⚡ Audit Report" }, { id: "keywords", label: "🔑 Keyword Strategy" }].map((tab) => (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{ padding: "10px 20px", background: "transparent", border: "none", borderBottom: `2px solid ${activeTab === tab.id ? ACCENT : "transparent"}`, color: activeTab === tab.id ? "#fff" : MUTED, fontWeight: activeTab === tab.id ? 700 : 400, cursor: "pointer", fontSize: 14, transition: "all 0.15s", marginBottom: -1 }}>{tab.label}</button>
                  ))}
                </div>

                {activeTab === "audit" && (
                  <div>
                    {sections.filter((s) => s.score != null).length > 0 && (
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 10, marginBottom: 28 }}>
                        {sections.filter((s) => s.score != null).map((s, i) => {
                          const level = s.score >= 70 ? "high" : s.score >= 40 ? "medium" : "low";
                          return (
                            <div key={i} style={{ background: CARD, border: `1px solid ${BORDER}`, borderRadius: 10, padding: "12px 14px", textAlign: "center" }}>
                              <div style={{ fontSize: 24, fontWeight: 900, color: SCORE_COLORS[level] }}>{s.score}</div>
                              <div style={{ fontSize: 11, color: MUTED, marginTop: 4, lineHeight: 1.3 }}>{s.title}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                    {sections.map((s, i) => <EditableSection key={i} section={s} onUpdate={(u) => updateSection(i, u)} />)}
                  </div>
                )}

                {activeTab === "keywords" && <KeywordStrategyTab strategy={keywordStrategy} />}

                <div style={{ display: "flex", gap: 12, marginTop: 28, flexWrap: "wrap" }}>
                  <button onClick={exportReport} style={{ background: ACCENT, border: "none", color: "#fff", borderRadius: 8, padding: "12px 24px", cursor: "pointer", fontSize: 14, fontWeight: 700 }}>↓ Export Report (HTML)</button>
                  <button onClick={() => { setReport(null); setSections([]); setKeywordStrategy(null); setActiveTab("audit"); }} style={{ background: "transparent", border: `1px solid ${BORDER}`, color: MUTED, borderRadius: 8, padding: "12px 24px", cursor: "pointer", fontSize: 14 }}>← New Audit</button>
                </div>
              </div>
            )}
          </div>

          <style>{`
            textarea:focus { border-color: ${ACCENT}88 !important; outline: none; }
            input:focus { border-color: ${ACCENT}88 !important; outline: none; }
          `}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AdsAuditor />);
  </script>
</body>
</html>
